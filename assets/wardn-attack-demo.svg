<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" role="img" aria-label="wardn demo — four malicious tool-calls blocked by the gateway, animated loop">
  <title>wardn demo</title>
  <desc>Animated terminal recording: npx wardn demo spawns an evil MCP server through the gateway and blocks four attack tool-calls (read_secret, exfiltrate, nuke, shell_exec).</desc>

  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#4db4dc" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#4db4dc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="winBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1525"/>
      <stop offset="100%" stop-color="#000510"/>
    </linearGradient>
  </defs>

  <!-- terminal window -->
  <rect width="800" height="540" fill="#000510"/>
  <rect width="800" height="540" fill="url(#glow)"/>
  <rect x="20" y="20" width="760" height="500" rx="10" fill="url(#winBg)" stroke="rgba(77,180,220,0.18)"/>

  <!-- title bar -->
  <rect x="20" y="20" width="760" height="32" rx="10" fill="#06121f"/>
  <rect x="20" y="42" width="760" height="10" fill="#06121f"/>
  <circle cx="42" cy="36" r="6" fill="#ff6b8a" opacity="0.85"/>
  <circle cx="62" cy="36" r="6" fill="#f6c360" opacity="0.85"/>
  <circle cx="82" cy="36" r="6" fill="#7be0a4" opacity="0.85"/>
  <text x="400" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-size="11" fill="#6f93a8" letter-spacing="1.5">wardn — demo</text>

  <!-- content -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-size="13">

    <!-- L1 prompt -->
    <g opacity="0">
      <text x="46" y="86" fill="#4db4dc">$</text>
      <text x="62" y="86" fill="#d6ecf6">npx wardn demo</text>
      <animate attributeName="opacity"
        values="0;1;1;0"
        keyTimes="0;0.02;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- L2 header -->
    <g opacity="0">
      <text x="46" y="118" fill="#d6ecf6" font-weight="600">wardn demo</text>
      <text x="135" y="118" fill="#6f93a8">— running an evil MCP server through the gateway</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.05;0.08;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- L3-L5 sandbox policy block -->
    <g opacity="0">
      <text x="60" y="148" fill="#6f93a8">sandbox policy:</text>
      <text x="78" y="170" fill="#6f93a8">fs </text>
      <text x="110" y="170" fill="#7fd0ee">~/.wardn/sandboxes/evil-mcp</text>
      <text x="78" y="188" fill="#6f93a8">net</text>
      <text x="110" y="188" fill="#ff6b8a">off</text>
      <text x="78" y="206" fill="#6f93a8">env</text>
      <text x="110" y="206" fill="#3d5a6e">(baseline only)</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.09;0.13;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- attack 1 -->
    <g opacity="0">
      <text x="46" y="240" fill="#6f93a8">→ attacker calls </text>
      <text x="180" y="240" fill="#f6c360">read_secret</text>
      <text x="260" y="240" fill="#6f93a8">(read ~/.ssh/id_rsa)</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.18;0.21;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="60" y="260" fill="#ff6b8a" font-weight="600">✕ BLOCKED</text>
      <text x="145" y="260" fill="#6f93a8">path "~/.ssh/id_rsa" outside sandbox policy</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.23;0.26;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- attack 2 -->
    <g opacity="0">
      <text x="46" y="292" fill="#6f93a8">→ attacker calls </text>
      <text x="180" y="292" fill="#f6c360">exfiltrate</text>
      <text x="252" y="292" fill="#6f93a8">(POST stolen data to evil.example)</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.32;0.35;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="60" y="312" fill="#ff6b8a" font-weight="600">✕ BLOCKED</text>
      <text x="145" y="312" fill="#6f93a8">network disabled — blocked tool-call to https://evil.example</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.37;0.40;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- attack 3 -->
    <g opacity="0">
      <text x="46" y="344" fill="#6f93a8">→ attacker calls </text>
      <text x="180" y="344" fill="#f6c360">nuke</text>
      <text x="216" y="344" fill="#6f93a8">(rm -rf the user's home directory)</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.46;0.49;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="60" y="364" fill="#ff6b8a" font-weight="600">✕ BLOCKED</text>
      <text x="145" y="364" fill="#6f93a8">path "~/" outside sandbox policy</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.51;0.54;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- attack 4 -->
    <g opacity="0">
      <text x="46" y="396" fill="#6f93a8">→ attacker calls </text>
      <text x="180" y="396" fill="#f6c360">shell_exec</text>
      <text x="252" y="396" fill="#6f93a8">(shell out: curl | sh)</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.60;0.63;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <text x="60" y="416" fill="#ff6b8a" font-weight="600">✕ BLOCKED</text>
      <text x="145" y="416" fill="#6f93a8">tool name matches dangerous-tool pattern</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.65;0.68;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- summary -->
    <g opacity="0">
      <text x="46" y="464" fill="#7be0a4" font-weight="600">✓ 4/4 attempts blocked</text>
      <text x="220" y="464" fill="#6f93a8">— without wardn, every call above would have run on your machine.</text>
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.74;0.78;0.95;1"
        dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- blinking cursor -->
    <rect x="62" y="488" width="9" height="14" fill="#4db4dc">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
