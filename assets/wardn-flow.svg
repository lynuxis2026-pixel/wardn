<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" role="img" aria-labelledby="flow-title flow-desc">
  <title id="flow-title">wardn data flow</title>
  <desc id="flow-desc">An AI client sends MCP tool-calls into the wardn gateway. The sandbox policy and scanner inspect each call: in-policy calls flow through to the real MCP server; out-of-policy calls are rejected with a synthetic JSON-RPC error before the server is reached. Every event is appended to a local log that the dashboard streams over SSE.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#4db4dc" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#4db4dc" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4db4dc"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b8a"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d5a6e"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#000510"/>
  <rect width="880" height="380" fill="url(#bg)"/>

  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
    <!-- ===== AI Client ===== -->
    <g>
      <rect x="36" y="120" width="160" height="100" rx="10" fill="#081826" stroke="rgba(77,180,220,0.32)"/>
      <text x="116" y="146" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.5">AI CLIENT</text>
      <text x="116" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#d6ecf6">Claude Desktop</text>
      <text x="116" y="190" text-anchor="middle" font-size="11" fill="#6f93a8">Cursor · VS Code</text>
      <text x="116" y="208" text-anchor="middle" font-size="11" fill="#6f93a8">your own agent</text>
    </g>

    <!-- ===== wardn box ===== -->
    <g>
      <rect x="246" y="60" width="380" height="260" rx="14" fill="#06121f" stroke="#4db4dc" stroke-width="1.2"/>
      <text x="436" y="86" text-anchor="middle" font-size="11" fill="#4db4dc" letter-spacing="2.5">⛨ WARDN — LOCAL</text>

      <!-- proxy -->
      <rect x="266" y="106" width="160" height="56" rx="8" fill="#0c2235" stroke="rgba(77,180,220,0.32)"/>
      <text x="346" y="128" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.4">STDIO PROXY</text>
      <text x="346" y="148" text-anchor="middle" font-size="12" fill="#d6ecf6">byte-faithful</text>

      <!-- sandbox -->
      <rect x="446" y="106" width="160" height="56" rx="8" fill="#0c2235" stroke="rgba(77,180,220,0.32)"/>
      <text x="526" y="128" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.4">SANDBOX POLICY</text>
      <text x="526" y="148" text-anchor="middle" font-size="12" fill="#d6ecf6">fs · net · env</text>

      <!-- scanner -->
      <rect x="266" y="182" width="160" height="56" rx="8" fill="#0c2235" stroke="rgba(77,180,220,0.32)"/>
      <text x="346" y="204" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.4">SCANNER</text>
      <text x="346" y="224" text-anchor="middle" font-size="12" fill="#d6ecf6">explainable signals</text>

      <!-- log -->
      <rect x="446" y="182" width="160" height="56" rx="8" fill="#0c2235" stroke="rgba(77,180,220,0.32)"/>
      <text x="526" y="204" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.4">EVENT LOG</text>
      <text x="526" y="224" text-anchor="middle" font-size="12" fill="#d6ecf6">~/.wardn/gateway.log</text>

      <!-- dashboard -->
      <rect x="266" y="258" width="340" height="46" rx="8" fill="#0c2235" stroke="rgba(77,180,220,0.32)"/>
      <text x="436" y="278" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.4">DASHBOARD</text>
      <text x="436" y="294" text-anchor="middle" font-size="12" fill="#d6ecf6">http://127.0.0.1:7331  ·  /api/events  (SSE)</text>
    </g>

    <!-- ===== MCP Server ===== -->
    <g>
      <rect x="684" y="120" width="160" height="100" rx="10" fill="#081826" stroke="rgba(77,180,220,0.32)"/>
      <text x="764" y="146" text-anchor="middle" font-size="10" fill="#6f93a8" letter-spacing="1.5">MCP SERVER</text>
      <text x="764" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#d6ecf6">filesystem</text>
      <text x="764" y="190" text-anchor="middle" font-size="11" fill="#6f93a8">github · fetch</text>
      <text x="764" y="208" text-anchor="middle" font-size="11" fill="#6f93a8">3rd-party</text>
    </g>

    <!-- ===== arrows ===== -->
    <line x1="196" y1="158" x2="262" y2="134" stroke="#4db4dc" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
    <text x="220" y="138" font-size="10" fill="#7fd0ee">tools/call</text>

    <line x1="606" y1="134" x2="680" y2="158" stroke="#4db4dc" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
    <text x="624" y="128" font-size="10" fill="#7fd0ee">allowed</text>

    <!-- reject arrow back -->
    <path d="M526 162 Q 526 248, 196 200" fill="none" stroke="#ff6b8a" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-pink)"/>
    <text x="320" y="244" font-size="10" fill="#ff6b8a">isError (synthetic)</text>

    <!-- log → dashboard -->
    <line x1="526" y1="238" x2="526" y2="256" stroke="#3d5a6e" stroke-width="1" marker-end="url(#arrow-dim)"/>
    <line x1="346" y1="238" x2="346" y2="256" stroke="#3d5a6e" stroke-width="1" marker-end="url(#arrow-dim)"/>

    <!-- bottom label -->
    <text x="440" y="350" text-anchor="middle" font-size="11" fill="#6f93a8">Every JSON-RPC line is parsed for the log; bytes are forwarded verbatim.</text>
  </g>
</svg>
