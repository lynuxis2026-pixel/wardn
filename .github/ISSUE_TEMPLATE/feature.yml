name: Feature / proposal
description: A new signal, sandbox capability, client, or workflow.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: Concrete situation where wardn falls short today. Skip the solution for now.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you add or change. Keep it minimal — wardn stays small on purpose.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays local (no telemetry, no remote calls)
        - label: This does not introduce a heavyweight dependency
        - label: This is explainable (every flag has a human-readable reason)
