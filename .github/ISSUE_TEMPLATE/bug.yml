name: Bug report
description: Something wardn does wrong or doesn't catch when it should.
labels: [bug, triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of the bug. If wardn missed something risky, paste the MCP server config (with secrets redacted).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands. Fixture configs are great; redacted real configs work too.
      placeholder: |
        npx wardn scan --from fixtures
        npx wardn sandbox enable filesystem --path /tmp
        npx wardn gateway run filesystem
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: wardn version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "v20.11.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt (~/.wardn/gateway.log)
      description: Trim to the relevant lines; redact paths or tokens.
      render: jsonl
