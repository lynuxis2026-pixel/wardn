name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: type-check
        run: npx tsc --noEmit

      - name: test (with coverage on ubuntu+node20)
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        run: npm run test:coverage

      - name: test
        if: matrix.os != 'ubuntu-latest' || matrix.node != '20'
        run: npm test

      - name: build
        run: npm run build

      - name: dashboard build
        run: npm run dashboard:build

      - name: pack (dry-run)
        run: npm pack --dry-run
